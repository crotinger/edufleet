name: edufleet

services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: edufleet-app
    restart: unless-stopped
    ports:
      - "${APP_HTTP_PORT:-8080}:80"
      - "${APP_HTTPS_PORT:-8443}:443"
    environment:
      SERVER_NAME: ${SERVER_NAME:-:80}
    volumes:
      - ./src:/app
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [edufleet]

  worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: edufleet-worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--max-time=3600", "--sleep=1"]
    volumes:
      - ./src:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [edufleet]

  db:
    image: postgres:16-alpine
    container_name: edufleet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edufleet}
      POSTGRES_USER: ${POSTGRES_USER:-edufleet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edufleet}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [edufleet]

  redis:
    image: redis:7-alpine
    container_name: edufleet-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [edufleet]

  # ============================================================
  # Optional — route optimization stack. Opt-in via:
  #   docker compose --profile vrp up -d
  # First `osrm` start downloads the regional OSM extract (~250 MB
  # for a US state) and preprocesses it (one-time, ~5–10 min,
  # ~2 GB RAM peak). Subsequent starts reuse cached .osrm files.
  # ============================================================

  # One-shot sidecar that downloads the regional PBF extract from Geofabrik
  # into the shared osrm_data volume before osrm runs. Uses alpine (not the
  # osrm-backend base image) because recent osrm-backend images ship on a
  # long-EOL Debian Stretch with dead apt mirrors.
  osrm-data:
    image: alpine:3.19
    container_name: edufleet-osrm-data
    restart: "no"
    profiles: ["vrp"]
    environment:
      OSRM_REGION: ${OSRM_REGION:-kansas}
      OSRM_PBF_URL: ${OSRM_PBF_URL:-}
    volumes:
      - osrm_data:/data
    command:
      - /bin/sh
      - -c
      - |
        set -e
        REGION="$${OSRM_REGION:-kansas}"
        URL="$${OSRM_PBF_URL:-https://download.geofabrik.de/north-america/us/$${REGION}-latest.osm.pbf}"
        PBF="/data/$${REGION}-latest.osm.pbf"
        OSRM_FILE="/data/$${REGION}-latest.osrm"
        if [ -f "$$OSRM_FILE" ]; then
            echo "[osrm-data] already preprocessed at $$OSRM_FILE — skipping"
            exit 0
        fi
        if [ ! -f "$$PBF" ]; then
            apk add --no-cache wget ca-certificates >/dev/null
            echo "[osrm-data] Downloading $$URL"
            wget -q --show-progress -O "$$PBF" "$$URL"
            echo "[osrm-data] Download complete: $$(du -h $$PBF | cut -f1)"
        else
            echo "[osrm-data] PBF already present at $$PBF"
        fi
    networks: [edufleet]

  osrm:
    image: osrm/osrm-backend:v5.25.0
    container_name: edufleet-osrm
    restart: unless-stopped
    profiles: ["vrp"]
    depends_on:
      osrm-data:
        condition: service_completed_successfully
    entrypoint: ["/bin/bash", "/bootstrap.sh"]
    environment:
      OSRM_REGION: ${OSRM_REGION:-kansas}
    volumes:
      - osrm_data:/data
      - ./docker/osrm/bootstrap.sh:/bootstrap.sh:ro
    ports:
      - "127.0.0.1:${OSRM_PORT:-5000}:5000"
    networks: [edufleet]

  vroom:
    # vroomvrp/vroom-docker has no `latest` tag — pin to a specific version.
    # Latest stable as of this commit is v1.13.0; check Docker Hub before bumping:
    #   https://hub.docker.com/r/vroomvrp/vroom-docker/tags
    image: vroomvrp/vroom-docker:v1.13.0
    container_name: edufleet-vroom
    restart: unless-stopped
    profiles: ["vrp"]
    depends_on:
      - osrm
    volumes:
      - ./docker/vroom/config.yml:/vroom-express/config.yml:ro
      - vroom_logs:/logs
    ports:
      - "127.0.0.1:${VROOM_PORT:-3000}:3000"
    networks: [edufleet]

volumes:
  db_data:
  redis_data:
  caddy_data:
  caddy_config:
  osrm_data:
  vroom_logs:

networks:
  edufleet:
