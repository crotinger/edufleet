name: edufleet

services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: edufleet-app
    restart: unless-stopped
    ports:
      - "${APP_HTTP_PORT:-8080}:80"
      - "${APP_HTTPS_PORT:-8443}:443"
    environment:
      SERVER_NAME: ${SERVER_NAME:-:80}
    volumes:
      - ./src:/app
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [edufleet]

  worker:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: edufleet-worker
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--max-time=3600", "--sleep=1"]
    volumes:
      - ./src:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [edufleet]

  db:
    image: postgres:16-alpine
    container_name: edufleet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-edufleet}
      POSTGRES_USER: ${POSTGRES_USER:-edufleet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-edufleet}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [edufleet]

  redis:
    image: redis:7-alpine
    container_name: edufleet-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks: [edufleet]

  # ============================================================
  # Optional — route optimization stack. Opt-in via:
  #   docker compose --profile vrp up -d
  # First `osrm` start downloads the regional OSM extract (~250 MB
  # for a US state) and preprocesses it (one-time, ~5–10 min,
  # ~2 GB RAM peak). Subsequent starts reuse cached .osrm files.
  # ============================================================

  osrm:
    image: osrm/osrm-backend:latest
    container_name: edufleet-osrm
    restart: unless-stopped
    profiles: ["vrp"]
    entrypoint: ["/bin/bash", "/bootstrap.sh"]
    environment:
      OSRM_REGION: ${OSRM_REGION:-kansas}
      OSRM_PBF_URL: ${OSRM_PBF_URL:-}
    volumes:
      - osrm_data:/data
      - ./docker/osrm/bootstrap.sh:/bootstrap.sh:ro
    ports:
      - "127.0.0.1:${OSRM_PORT:-5000}:5000"
    networks: [edufleet]

  vroom:
    # vroomvrp/vroom-docker has no `latest` tag — pin to a specific version.
    # Latest stable as of this commit is v1.13.0; check Docker Hub before bumping:
    #   https://hub.docker.com/r/vroomvrp/vroom-docker/tags
    image: vroomvrp/vroom-docker:v1.13.0
    container_name: edufleet-vroom
    restart: unless-stopped
    profiles: ["vrp"]
    depends_on:
      - osrm
    volumes:
      - ./docker/vroom/config.yml:/conf/config.yml:ro
      - vroom_logs:/logs
    ports:
      - "127.0.0.1:${VROOM_PORT:-3000}:3000"
    networks: [edufleet]

volumes:
  db_data:
  redis_data:
  caddy_data:
  caddy_config:
  osrm_data:
  vroom_logs:

networks:
  edufleet:
